# Qdrant: REST + gRPC и веб-дашборд
# API: интервью-помощник с RAG по docx-файлу

services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OLLAMA_TIMEOUT_SEC: ${OLLAMA_TIMEOUT_SEC:-120}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-interview_qa}
      QDRANT_SHARD_NUMBER: ${QDRANT_SHARD_NUMBER:-2}
      QDRANT_REPLICATION_FACTOR: ${QDRANT_REPLICATION_FACTOR:-1}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-16}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      VECTORIZATION_MAX_CHUNK_CHARS: ${VECTORIZATION_MAX_CHUNK_CHARS:-1000}
      VECTORIZATION_OVERLAP: ${VECTORIZATION_OVERLAP:-100}
      INTERVIEW_TOP_K: ${INTERVIEW_TOP_K:-5}
      INTERVIEW_DOCX_PATH: /app/app/interview_questions.docx
      INGEST_STATE_PATH: ${INGEST_STATE_PATH:-data/interview_ingest_state.json}
      INGEST_INTERVAL_HOURS: ${INGEST_INTERVAL_HOURS:-1}
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
